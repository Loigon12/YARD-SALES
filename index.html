<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yard Sale | Segundas Oportunidades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Inter:wght@300;400;600&display=swap');
        h1 { font-family: 'Lora', serif; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen">

    <nav class="flex justify-between items-center p-6 max-w-6xl mx-auto sticky top-0 bg-stone-50/80 backdrop-blur-md z-40">
        <h1 class="text-2xl text-amber-900">Yard Sale.</h1>
        <div class="flex gap-4">
            <button onclick="handleProfileClick()" class="p-2 hover:bg-stone-200 rounded-full transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <button onclick="toggleCart()" class="p-2 hover:bg-stone-200 rounded-full transition relative">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                <span id="cart-count" class="absolute top-0 right-0 bg-amber-700 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </nav>

    <header class="max-w-4xl mx-auto px-6 py-20 text-center">
        <span class="text-amber-800 font-semibold tracking-widest text-xs uppercase mb-4 block">Segundas Oportunidades</span>
        <h1 class="text-5xl md:text-6xl mb-6 text-stone-900 leading-tight">Dando una nueva vida a nuestros tesoros</h1>
        <p class="text-lg text-stone-600 leading-relaxed max-w-2xl mx-auto font-light italic">
            "Esta venta nace de la intención de soltar lo que ya no usamos para hacer espacio a nuevas experiencias."
        </p>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-black/40 justify-center items-center z-50 px-4 hidden">
        <div class="bg-white w-full max-w-sm p-8 shadow-2xl rounded-2xl relative">
            <button onclick="toggleAuthModal()" class="absolute top-4 right-4 text-stone-400 hover:text-stone-600">✕</button>
            <h2 id="auth-title" class="text-2xl text-center mb-2">Iniciar Sesión</h2>
            <p id="auth-subtitle" class="text-stone-500 text-sm text-center mb-8 text-balance">Ingresa para guardar tus tesoros</p>
            
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Email</label>
                    <input type="email" id="email" class="w-full border border-stone-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-900/20 bg-stone-50" required>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Contraseña</label>
                    <input type="password" id="password" class="w-full border border-stone-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-900/20 bg-stone-50" required>
                </div>
                <div id="confirm-pass-container" class="hidden">
                    <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" class="w-full border border-stone-200 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-amber-900/20 bg-stone-50">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-stone-900 text-white py-3.5 rounded-lg font-semibold hover:bg-stone-800 transition shadow-lg shadow-stone-200">
                    Entrar
                </button>
            </form>
            <p class="mt-8 text-xs text-center text-stone-500">
                <span id="auth-switch-text">¿No tienes cuenta?</span>
                <button onclick="switchAuthMode()" id="auth-switch-btn" class="text-amber-800 font-bold hover:underline ml-1">Regístrate</button>
            </p>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/40 justify-end z-50 transition-opacity hidden">
        <div class="bg-white w-full max-w-md h-full p-8 shadow-2xl flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl">Tu Carrito</h2>
                <button onclick="toggleCart()" class="text-stone-400 hover:text-stone-600">✕</button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4 mb-6"></div>
            <div class="border-t border-stone-100 pt-6">
                <div class="flex justify-between text-xl mb-6">
                    <span>Total</span>
                    <span id="cart-total" class="font-bold text-amber-900">$0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-amber-900 text-white py-4 rounded-xl font-bold hover:bg-amber-800 transition">
                    Confirmar Compra
                </button>
            </div>
        </div>
    </div>

    <script>
        /** CONFIGURACIÓN SUPABASE **/
        const supabaseUrl = 'https://srypoldlcviwmtzequmh.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyeXBvbGRsY3Zpd210emVxdW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTIzMjQsImV4cCI6MjA4OTM2ODMyNH0.sAVAvSfCV2eDfMWZioKFLcsh4g-6I4m8hEpqaAkSfys'; // Cambia esto por la llave que empieza con eyJ
        const miYardSale = supabase.createClient(supabaseUrl, supabaseKey);

        /** DATOS Y ESTADO **/
        const products = [
            { id: 1, name: "Cámara Analógica Canon", price: 85, img: "https://images.unsplash.com/photo-1516961642265-531546e84af2?w=500&auto=format" },
            { id: 2, name: "Lámpara Minimalista", price: 30, img: "https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=500&auto=format" },
            { id: 3, name: "Silla de Mimbre", price: 45, img: "https://images.unsplash.com/photo-1519947486511-4614940ea124?w=500&auto=format" },
            { id: 4, name: "Espejo Vintage Dorado", price: 60, img: "https://images.unsplash.com/photo-1618220179428-22790b461013?w=500&auto=format" }
        ];

        let cart = [];
        let isSignUpMode = false;

        /** FUNCIONES DE INTERFAZ **/
        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="group bg-white rounded-2xl overflow-hidden border border-stone-100 shadow-sm hover:shadow-xl transition-all duration-300">
                    <div class="relative overflow-hidden aspect-square">
                        <img src="${p.img}" class="object-cover w-full h-full group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="p-6">
                        <h3 class="text-stone-900 font-medium mb-1">${p.name}</h3>
                        <p class="text-amber-900 font-bold mb-4 text-xl">$${p.price}</p>
                        <button onclick="addToCart(${p.id})" class="w-full border border-stone-200 py-2.5 rounded-lg text-sm font-semibold hover:bg-stone-900 hover:text-white transition-colors duration-300">
                            Agregar al carrito
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function toggleAuthModal() {
            const modal = document.getElementById('auth-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.classList.toggle('hidden');
            modal.classList.toggle('flex');
        }

        async function handleProfileClick() {
            const { data: { user } } = await miYardSale.auth.getUser();
            if (user) window.location.href = 'cuenta.html';
            else toggleAuthModal();
        }

        function switchAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? "Crear Cuenta" : "Iniciar Sesión";
            document.getElementById('auth-submit-btn').innerText = isSignUpMode ? "Registrarse" : "Entrar";
            document.getElementById('confirm-pass-container').classList.toggle('hidden');
            document.getElementById('auth-switch-text').innerText = isSignUpMode ? "¿Ya tienes cuenta?" : "¿No tienes cuenta?";
            document.getElementById('auth-switch-btn').innerText = isSignUpMode ? "Inicia Sesión" : "Regístrate";
        }

        /** LÓGICA DE NEGOCIO **/
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');

            container.innerHTML = cart.map((item, index) => `
                <div class="flex items-center gap-4 bg-stone-50 p-3 rounded-xl">
                    <img src="${item.img}" class="w-16 h-16 rounded-lg object-cover">
                    <div class="flex-1">
                        <h4 class="text-sm font-medium">${item.name}</h4>
                        <p class="text-amber-900 font-bold">$${item.price}</p>
                    </div>
                    <button onclick="cart.splice(${index}, 1); updateCartUI()" class="text-stone-300 hover:text-red-500">✕</button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalEl.innerText = `$${total}`;
            countEl.innerText = cart.length;
            countEl.classList.toggle('hidden', cart.length === 0);
        }

        /** AUTENTICACIÓN Y COMPRA **/
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (isSignUpMode) {
                const { error } = await miYardSale.auth.signUp({ email, password });
                if (error) alert(error.message);
                else { alert("¡Registro exitoso!"); toggleAuthModal(); }
            } else {
                const { error } = await miYardSale.auth.signInWithPassword({ email, password });
                if (error) alert(error.message);
                else { alert("¡Bienvenido!"); toggleAuthModal(); }
            }
        });

        async function checkout() {
            const { data: { user } } = await miYardSale.auth.getUser();
            if (!user) { alert("Inicia sesión para comprar."); return toggleAuthModal(); }
            if (cart.length === 0) return alert("El carrito está vacío");

            const totalVenta = cart.reduce((sum, item) => sum + item.price, 0);
            const { error } = await miYardSale.from('compras').insert([{ 
                user_id: user.id, 
                articulos: cart, 
                total: totalVenta 
            }]);

            if (error) alert("Error al guardar: " + error.message);
            else { alert("¡Compra guardada!"); cart = []; updateCartUI(); toggleCart(); }
        }

        renderProducts();
    </script>
</body>
</html>
