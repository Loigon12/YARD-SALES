<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta | Yard Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:wght@600&family=Inter:wght@300;400;600&display=swap');
        h1, h2 { font-family: 'Lora', serif; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen">

    <nav class="p-6 max-w-6xl mx-auto flex justify-between items-center">
        <a href="index.html" class="text-amber-900 font-bold hover:underline flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Volver a la tienda
        </a>
        <button onclick="logout()" class="text-sm font-semibold text-red-600 hover:bg-red-50 px-4 py-2 rounded-lg transition">Cerrar Sesión</button>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <section class="mb-12 bg-white p-8 rounded-2xl shadow-sm border border-stone-100">
            <h1 class="text-3xl mb-8">Mi Perfil</h1>
            <div class="flex items-center gap-6">
                <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center text-amber-900 text-3xl font-bold" id="user-initial">?</div>
                <div>
                    <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Cuenta Activa</p>
                    <p id="user-email" class="text-xl font-medium text-stone-900 italic">Cargando correo...</p>
                </div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-8 border-b border-stone-200 pb-4">
                <h2 class="text-2xl">Historial de Tesoros</h2>
                <span id="purchase-count" class="text-stone-400 text-sm italic">0 compras encontradas</span>
            </div>
            <div id="history-list" class="space-y-4">
                </div>
        </section>
    </main>

    <script>
        const supabaseUrl = 'https://srypoldlcviwmtzequmh.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyeXBvbGRsY3Zpd210emVxdW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTIzMjQsImV4cCI6MjA4OTM2ODMyNH0.sAVAvSfCV2eDfMWZioKFLcsh4g-6I4m8hEpqaAkSfys'; // La misma que en index.html
        const miYardSale = supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            const { data: { user } } = await miYardSale.auth.getUser();
            if (!user) return window.location.href = 'index.html';

            document.getElementById('user-email').textContent = user.email;
            document.getElementById('user-initial').textContent = user.email[0].toUpperCase();
            loadHistory(user.id);
        }

        async function loadHistory(userId) {
            const container = document.getElementById('history-list');
            const { data: compras, error } = await miYardSale
                .from('compras')
                .select('*')
                .eq('user_id', userId)
                .order('created_at', { ascending: false });

            if (error || !compras.length) {
                container.innerHTML = `<div class="text-center py-20 bg-stone-100/50 rounded-2xl border-2 border-dashed border-stone-200">
                    <p class="text-stone-400">Aún no has adquirido ningún tesoro.</p>
                </div>`;
                return;
            }

            document.getElementById('purchase-count').textContent = `${compras.length} pedidos encontrados`;
            
            container.innerHTML = compras.map(compra => `
                <div class="bg-white p-6 rounded-xl border border-stone-100 shadow-sm hover:shadow-md transition">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-6">
                        <div class="flex gap-6 items-center">
                            <div class="flex -space-x-3">
                                ${compra.articulos.slice(0, 4).map(item => `
                                    <img src="${item.img}" class="h-14 w-14 rounded-full border-4 border-white object-cover shadow-sm">
                                `).join('')}
                            </div>
                            <div>
                                <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">${new Date(compra.created_at).toLocaleDateString()}</p>
                                <p class="text-stone-900 font-semibold text-lg">${compra.articulos.length} artículos</p>
                            </div>
                        </div>
                        <div class="text-center md:text-right bg-stone-50 px-6 py-3 rounded-xl border border-stone-100 w-full md:w-auto">
                            <p class="text-amber-900 font-bold text-2xl">$${compra.total}</p>
                            <p class="text-[10px] text-stone-400 font-mono">Orden #${compra.id}</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-t border-stone-100 pt-6">
                        <div>
                            <span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-1">Entregar a</span>
                            <p class="text-sm font-medium text-stone-800">${compra.nombre || 'No registrado'}</p>
                            <p class="text-sm text-stone-500">${compra.direccion || 'No registrado'}</p>
                            <p class="text-sm text-stone-500">Tel: ${compra.telefono || 'No registrado'}</p>
                        </div>
                        <div class="md:text-right">
                            <span class="text-[10px] font-bold text-stone-400 uppercase tracking-widest block mb-1">Método de Pago</span>
                            <p class="text-sm font-medium text-stone-800 capitalize inline-flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                                ${compra.metodo_pago ? compra.metodo_pago.replace('-', ' ') : 'No registrado'}
                            </p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function logout() {
            await miYardSale.auth.signOut();
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
