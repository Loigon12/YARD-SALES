<html lang="es">

<body class="bg-stone-50 text-stone-800 min-h-screen">

    <nav class="p-6 max-w-6xl mx-auto flex justify-between items-center">

            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>

    <main class="max-w-4xl mx-auto px-6 py-12">

            <h1 class="text-3xl mb-8">Mi Perfil</h1>
            <div class="flex items-center gap-6">

                <div>
                    <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1">Cuenta Activa</p>
                    <p id="user-email" class="text-xl font-medium text-stone-900 italic">Cargando correo...</p>

        <section>

                <span id="purchase-count" class="text-stone-400 text-sm italic">0 compras encontradas</span>
            </div>
            <div id="history-list" class="space-y-4">
                </div>
        </section>

        <section class="mb-12">
        <div class="flex justify-between items-end mb-8 border-b border-stone-200 pb-4">
            <h2 class="text-2xl text-stone-950 font-semibold">Tus Tesoros Publicados</h2>
            <span id="selling-count" class="text-stone-400 text-sm italic">0 en venta</span>
        </div>
        <div id="selling-list" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <p class="text-stone-400 italic">Buscando tus publicaciones...</p>
        </div>
    </section>
    </main>

    <script>
        const supabaseUrl = 'https://srypoldlcviwmtzequmh.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNyeXBvbGRsY3Zpd210emVxdW1oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3OTIzMjQsImV4cCI6MjA4OTM2ODMyNH0.sAVAvSfCV2eDfMWZioKFLcsh4g-6I4m8hEpqaAkSfys'; // La misma que en index.html
        const miYardSale = supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            const { data: { user } } = await miYardSale.auth.getUser();
            if (!user) return window.location.href = 'index.html';

            document.getElementById('user-email').textContent = user.email;
            document.getElementById('user-initial').textContent = user.email[0].toUpperCase();
            
            // Cargar ambas secciones
            loadHistory(user.id);
            loadMySales(user.id); // <-- NUEVA LLAMADA
        }

        // --- NUEVA FUNCIÓN: CARGAR MIS VENTAS ---
        async function loadMySales(userId) {
            const container = document.getElementById('selling-list');
            const countLabel = document.getElementById('selling-count');

            // Consultamos la tabla 'productos' filtrando por 'vendedor_id'
            const { data: productos, error } = await miYardSale
                .from('productos')
                .select('*')
                .eq('vendedor_id', userId)
                .order('created_at', { ascending: false });

            if (error) {
                console.error("Error cargando ventas:", error);
                container.innerHTML = `<p class="text-red-500 italic col-span-full">Error al buscar tus publicaciones.</p>`;
                return;
            }

            if (!productos.length) {
                container.innerHTML = `<div class="col-span-full text-center py-10 bg-stone-100/50 rounded-xl border border-dashed border-stone-200">
                    <p class="text-stone-400 italic text-sm text-balance">No tienes tesoros publicados. ¡Pon tu primer objeto a la venta en la página principal!</p>
                </div>`;
                return;
            }

            countLabel.textContent = `${productos.length} en venta`;
            
            container.innerHTML = productos.map(p => `
                <div class="bg-white p-6 rounded-2xl border border-stone-100 shadow-sm flex items-start gap-4">
                    <img src="${p.imagen_url}" class="h-20 w-20 rounded-xl object-cover shadow-sm flex-shrink-0">
                    <div class="flex-1">
                        <div class="flex justify-between items-start gap-3 mb-2">
                            <h4 class="text-stone-950 font-semibold leading-snug line-clamp-1">${p.nombre}</h4>
                            <p class="text-amber-900 font-bold text-xl leading-none flex-shrink-0">$${p.precio}</p>
                        </div>
                        <p class="text-stone-500 text-xs mb-3 italic line-clamp-2">${p.descripcion}</p>
                        <p class="text-[10px] text-stone-400 uppercase tracking-wider font-medium">${new Date(p.created_at).toLocaleDateString()}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- HISTORIAL DE COMPRAS MEJORADO (sin cambios críticos, solo UI limpia) ---
        async function loadHistory(userId) {
            // ... (copia tu función loadHistory aquí, está perfecta como quedó) ...
        }

        async function logout() {
            await miYardSale.auth.signOut();
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
